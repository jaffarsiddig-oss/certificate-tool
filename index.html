<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu KG Superstar Award</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Playful KG Theme */
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif; 
            background: #e0f7fa; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }

        .editor-panel { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin-bottom: 30px; 
            width: 100%; max-width: 500px; text-align: center; border: 4px solid #ff8a65;
        }
        input, select { padding: 12px; width: 88%; margin: 10px 0; border: 2px solid #ddd; border-radius: 15px; font-size: 16px; outline: none; }
        input:focus { border-color: #ff4500; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 0 #ccc; }
        .btn-gen { background: #ff4500; color: white; box-shadow: 0 4px 0 #b33000; }
        .btn-dl { background: #4caf50; color: white; display: none; box-shadow: 0 4px 0 #2e7d32; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* THE KG CERTIFICATE DESIGN */
        #certificate { 
            display: none; width: 950px; height: 700px; background: #fff; 
            position: relative; overflow: hidden; border: 12px solid #ffcc33;
            border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            background-image: linear-gradient(to bottom, #ffffff, #e3f2fd);
        }

        /* Cute Decorative Elements */
        .sun { position: absolute; top: -30px; left: -30px; font-size: 120px; z-index: 1; }
        .cloud { position: absolute; font-size: 80px; color: rgba(255,255,255,0.9); z-index: 1; opacity: 0.8; }
        .star { position: absolute; font-size: 30px; color: #ffcc33; z-index: 1; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        .logo-area { text-align: center; margin-top: 40px; position: relative; z-index: 10; }
        .logo-img { width: 240px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }

        .main-title { 
            font-size: 60px; color: #ff4500; font-weight: 900; margin: 10px 0; 
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px #ffe0b2; position: relative; z-index: 10;
        }

        .content-body { position: relative; z-index: 10; text-align: center; margin-top: 20px; }
        .presented-text { font-size: 24px; color: #555; }
        
        .student-name { 
            font-size: 75px; color: #1e88e5; font-weight: bold; 
            margin: 15px 0; display: inline-block; padding: 0 40px;
            background: rgba(255,255,255,0.7); border-radius: 100px;
            border: 4px dashed #ff8a65;
        }

        .program-badge {
            background: #ffcc33; color: #4e342e; display: inline-block;
            padding: 12px 50px; border-radius: 50px; font-size: 34px;
            font-weight: 800; margin-top: 20px; box-shadow: 0 6px 0 #ffa000;
        }

        .motto { font-size: 20px; color: #78909c; font-style: italic; margin-top: 40px; }

        /* Footer - Positioned to Avoid Overlap */
        .footer { 
            position: absolute; bottom: 60px; width: 100%;
            display: flex; justify-content: space-around; align-items: flex-end; z-index: 10;
        }
        .footer-item { text-align: center; }
        .sig-name { font-family: 'Brush Script MT', cursive; font-size: 45px; color: #2c3e50; }
        .sig-line { border-top: 3px solid #ffcc33; padding-top: 8px; font-size: 15px; font-weight: bold; width: 220px; color: #555; }
        .date-val { font-size: 22px; font-weight: bold; color: #ff4500; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="editor-panel">
    <h2 style="color:#ff4500; margin-bottom:15px;">✨ KG Superstar Maker ✨</h2>
    <input type="text" id="stuName" placeholder="Little Student's Name">
    <input type="text" id="stuGrade" placeholder="Class (e.g. KG-1 or Nursery)">
    <select id="stuCourse">
        <option value="" disabled selected>Select the Fun Program</option>
        <option value="English Superstar">English Superstar</option>
        <option value="Super Math">Super Math</option>
        <option value="Super Speaker">Super Speaker</option>
        <option value="Super Coder">Super Coder</option>
    </select>
    <div class="btn-group">
        <button class="btn btn-gen" onclick="generate()">Make it Shine! 🚀</button>
        <button id="downloadBtn" class="btn btn-dl" onclick="downloadCert()">Save for Mommy & Daddy 📸</button>
    </div>
</div>

<div id="certificate">
    <div class="sun">☀️</div>
    <div class="cloud" style="top:50px; right:60px;">☁️</div>
    <div class="cloud" style="top:250px; left:20px; font-size:60px;">☁️</div>
    <div class="star" style="top:100px; left:300px;">⭐</div>
    <div class="star" style="top:400px; right:200px;">⭐</div>
    <div class="star" style="bottom:100px; left:100px;">⭐</div>
    
    <div class="logo-area">
        <img src="https://jaffarsiddig-oss.github.io/certificate-tool/image_2fccda.png" class="logo-img" alt="Vedantu Logo">
    </div>

    <div class="content-body">
        <div class="main-title">SUPERSTAR!</div>
        <div class="presented-text">This special award goes to</div>
        
        <div class="student-name" id="displayName">KIDDO NAME</div>
        
        <div style="font-size: 24px; color: #444; margin-top: 15px;">
            A bright spark in <span style="color:#ff4500; font-weight:bold;" id="displayGrade">KG</span> who did amazing in
        </div>

        <div class="program-badge" id="displayCourse">PROGRAM NAME</div>
        
        <div class="motto">"You are smart, you are brave, you are a genius!"</div>
    </div>

    <div class="footer">
        <div class="footer-item">
            <div class="date-val" id="displayDate">March 17, 2026</div>
            <div class="sig-line">AWARD DATE</div>
        </div>
        <div class="footer-item">
            <div class="sig-name">Vamsi Krishna</div>
            <div class="sig-line">
                Vamsi Krishna<br>
                CEO & Co-Founder, Vedantu
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;

        if(name && grade && course) {
            document.getElementById('displayName').innerText = name.toUpperCase();
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            
            const today = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('displayDate').innerText = today;

            document.getElementById('certificate').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("Please fill in all the magic details!");
        }
    }

    function downloadCert() {
        const cert = document.getElementById('certificate');
        html2canvas(cert, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'My_Superstar_Certificate.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
