<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Demo Certificate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #ffede6; display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }

        .editor-panel { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; 
            border-top: 5px solid #ff4500; width: 100%; max-width: 500px; text-align: center;
        }
        input, select { padding: 10px; width: 85%; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .gen-btn { background: #ff4500; color: white; padding: 12px 25px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .dl-btn { background: #3b82f6; color: white; padding: 12px 25px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; display: none; margin-top: 10px; }

        /* THE CERTIFICATE */
        #certificate { 
            display: none; width: 900px; height: 630px; background: white; 
            position: relative; overflow: hidden; border: 12px solid #ff4500;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 50%, #fff 0%, #fff9f5 100%);
        }

        /* FIXED LOGO IMAGE */
        .logo-img { width: 220px; margin-top: 30px; position: relative; z-index: 10; }

        /* DECORATIVE ELEMENTS (KIDS THEME) */
        .floating-icon { position: absolute; font-size: 50px; z-index: 1; opacity: 0.8; }
        .trophy { position: absolute; top: 40px; right: 50px; width: 110px; z-index: 5; }
        .medal { position: absolute; bottom: 40px; left: 50px; width: 90px; z-index: 5; }

        .content { position: relative; z-index: 5; text-align: center; }
        
        .main-header { color: #2c3e50; font-size: 45px; font-weight: 900; margin: 10px 0; letter-spacing: 1px; }
        .presented-to { font-size: 18px; color: #666; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .student-name { 
            font-size: 55px; color: #ff4500; font-weight: bold; 
            margin: 10px 0; font-family: 'Georgia', serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .course-text { font-size: 22px; color: #444; margin: 15px 0; }
        .program-badge {
            background: #3b82f6; color: white; display: inline-block;
            padding: 10px 40px; border-radius: 10px; font-size: 28px;
            font-weight: 800; margin-top: 5px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .footer { 
            display: flex; justify-content: space-around; align-items: flex-end; 
            margin-top: 40px; padding: 0 50px;
        }
        .sig-name { font-family: 'Brush Script MT', cursive; font-size: 38px; color: #2c3e50; margin-bottom: -5px; }
        .sig-line { border-top: 2px solid #333; padding-top: 5px; font-size: 13px; font-weight: bold; width: 220px; }

    </style>
</head>
<body>

<div class="editor-panel">
    <h3>Demo Certificate Tool</h3>
    <input type="text" id="stuName" placeholder="Full Name">
    <input type="text" id="stuGrade" placeholder="Grade">
    <select id="stuCourse">
        <option value="" disabled selected>Select Program</option>
        <option value="English Superstar">English Superstar</option>
        <option value="Super Math">Super Math</option>
        <option value="Super Speaker">Super Speaker</option>
        <option value="Super Coder">Super Coder</option>
    </select>
    <br><br>
    <button class="gen-btn" onclick="generate()">Generate ✨</button>
    <button id="downloadBtn" class="dl-btn" onclick="downloadCert()">Save to Gallery 📸</button>
</div>

<div id="certificate">
    <div class="floating-icon" style="top:20px; left:30px;">🚀</div>
    <div class="floating-icon" style="bottom:120px; right:40px;">🎨</div>
    <div class="floating-icon" style="top:250px; left:15px; font-size:30px;">⭐</div>
    
    <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="trophy">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" class="medal">

    <div class="content">
        <img src="https://jaffarsiddig-oss.github.io/certificate-tool/image_3035f6.png" class="logo-img" alt="Vedantu Early Learning">
        
        <div class="presented-to">Achievement Award</div>
        <div class="main-header">CONGRATULATIONS</div>

        <div class="presented-to">Proudly Presented To</div>
        <div class="student-name" id="displayName">NAME</div>

        <div class="course-text">
            of <b>Grade <span id="displayGrade">X</span></b> for brilliant participation in
            <br>
            <div class="program-badge" id="displayCourse">PROGRAM</div>
        </div>

        <div class="footer">
            <div>
                <div style="font-size: 18px; font-weight: bold;" id="displayDate">Date</div>
                <div class="sig-line">DATE</div>
            </div>
            <div>
                <div class="sig-name">Vamsi Krishna</div>
                <div class="sig-line">Vamsi Krishna<br>CEO, Vedantu</div>
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;

        if(name && grade && course) {
            document.getElementById('displayName').innerText = name.toUpperCase();
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString();

            document.getElementById('certificate').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    function downloadCert() {
        const cert = document.getElementById('certificate');
        html2canvas(cert, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Vedantu_Certificate.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
