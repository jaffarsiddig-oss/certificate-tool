<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Kid-Friendly Certificate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700;900&display=swap');

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }

        .admin-panel { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; 
            border-top: 6px solid #ff4500; width: 100%; max-width: 480px; text-align: center;
        }
        input, select { padding: 10px; width: 90%; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .btn-gen { background: #ff4500; color: #fff; padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; width: 95%; margin-top: 10px; }
        .btn-dl { background: #28a745; color: #fff; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; display: none; margin-top: 10px; }

        /* THE CERTIFICATE */
        #certificate { 
            display: none; width: 1000px; height: 700px; background: #fff; position: relative;
            overflow: hidden; border: 12px solid #ff4500; box-sizing: border-box;
        }

        /* VIBRANT PATTERN BACKDROP */
        .backdrop {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background-image: radial-gradient(#ffdfba 2px, transparent 2px), radial-gradient(#bae1ff 2px, #ffffff 2px);
            background-size: 50px 50px; background-position: 0 0, 25px 25px;
            opacity: 0.4; z-index: 1;
        }

        /* RANDOM KID GRAPHICS */
        .kid-icon { position: absolute; z-index: 5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .trophy { top: 30px; left: 30px; width: 80px; transform: rotate(-10deg); }
        .rocket { bottom: 40px; right: 40px; width: 90px; transform: rotate(-15deg); }
        .globe { top: 40px; right: 50px; width: 70px; }
        .books { bottom: 150px; left: 30px; width: 70px; transform: rotate(10deg); }
        .stars { top: 180px; right: 30px; width: 60px; opacity: 0.8; }
        .cap { bottom: 30px; left: 160px; width: 70px; transform: rotate(-5deg); }

        .cert-content { 
            position: relative; z-index: 10; height: 100%; width: 100%;
            display: flex; flex-direction: column; align-items: center; 
            padding: 25px 50px; box-sizing: border-box; text-align: center;
        }

        .logo-img { height: 65px; margin-bottom: 5px; }
        .type-label { font-size: 11px; color: #ff4500; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 2px; }
        .title-main { font-family: 'Cinzel', serif; font-size: 52px; color: #2c3e50; margin: 0; line-height: 1; }

        .presented-to { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 18px; color: #555; margin: 12px 0; }
        
        .name-container { 
            width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; 
            border-bottom: 3px dashed #ff4500; max-width: 600px; margin: 0 auto;
        }
        .student-name { 
            font-size: 65px; color: #ff4500; font-weight: 900; margin: 0; 
            text-transform: uppercase; white-space: nowrap;
        }

        .achievement-text { font-family: 'Libre Baskerville', serif; font-size: 20px; color: #2c3e50; margin: 15px 0; line-height: 1.4; }
        .course-highlight { font-weight: 900; font-size: 30px; color: #007bff; text-transform: uppercase; display: block; margin-top: 5px; }

        /* FOOTER */
        .footer { 
            width: 100%; display: flex; justify-content: space-around; align-items: flex-end; 
            margin-top: auto; padding-bottom: 30px;
        }
        .footer-col { text-align: center; min-width: 220px; }
        .date-val { font-size: 19px; font-weight: 700; color: #2c3e50; margin-bottom: 5px; }
        .sig-val { font-family: 'Great Vibes', cursive; font-size: 42px; color: #2c3e50; margin-bottom: -10px; }
        .line { border-top: 2px solid #d4af37; padding-top: 8px; font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }

    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="color:#ff4500; margin-bottom: 15px;">Demo Certificate Generator</h2>
    <input type="text" id="stuName" placeholder="Child's Name">
    <select id="stuGrade">
        <option value="" disabled selected>Select Grade</option>
        <option value="Grade 1">Grade 1</option><option value="Grade 2">Grade 2</option>
        <option value="Grade 3">Grade 3</option><option value="Grade 4">Grade 4</option>
        <option value="Grade 5">Grade 5</option><option value="Grade 6">Grade 6</option>
    </select>
    <select id="stuCourse">
        <option value="" disabled selected>Select Program</option>
        <option value="ENGLISH SUPERSTAR">English Superstar</option>
        <option value="SUPER MATH">Super Math</option>
        <option value="SUPER CODER">Super Coder</option>
    </select>
    <button class="btn-gen" onclick="generate()">Generate ✨</button>
    <button id="downloadBtn" class="btn-dl" onclick="download()">Download PNG 📥</button>
</div>

<div id="certificate">
    <div class="backdrop"></div>
    
    <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="kid-icon trophy">
    <img src="https://cdn-icons-png.flaticon.com/512/1041/1041883.png" class="kid-icon rocket">
    <img src="https://cdn-icons-png.flaticon.com/512/814/814513.png" class="kid-icon globe">
    <img src="https://cdn-icons-png.flaticon.com/512/2702/2702134.png" class="kid-icon books">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" class="kid-icon stars">
    <img src="https://cdn-icons-png.flaticon.com/512/2490/2490354.png" class="kid-icon cap">

    <div class="cert-content">
        <img src="https://jaffarsiddig-oss.github.io/certificate-tool/image_2fccda.png" class="logo-img">
        
        <div class="header-box">
            <div class="type-label">Official Certificate of Achievement</div>
            <h1 class="title-main">CONGRATULATIONS</h1>
        </div>

        <p class="presented-to">This recognition is proudly awarded to</p>
        
        <div class="name-container">
            <p class="student-name" id="displayName">NAME</p>
        </div>

        <p class="achievement-text">
            of <span style="font-weight:700; color:#ff4500;" id="displayGrade">GRADE</span> for demonstrating exceptional potential <br> during the official demo session of
            <span class="course-highlight" id="displayCourse">PROGRAM</span>
        </p>

        <div class="footer">
            <div class="footer-col">
                <div class="date-val" id="displayDate">March 17, 2026</div>
                <div class="line">Date of Award</div>
            </div>
            <div class="footer-col">
                <div class="sig-val">Vamsi Krishna</div>
                <div class="line">CEO & Co-Founder, Vedantu</div>
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;

        if(name && grade && course) {
            const nameEl = document.getElementById('displayName');
            nameEl.innerText = name.toUpperCase();
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });

            // Auto-shrink name font
            let size = 65;
            nameEl.style.fontSize = size + 'px';
            while (nameEl.scrollWidth > 580 && size > 12) {
                size -= 2;
                nameEl.style.fontSize = size + 'px';
            }

            document.getElementById('certificate').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-block';
        } else {
            alert("Please fill all fields!");
        }
    }

    function download() {
        html2canvas(document.getElementById('certificate'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Vedantu_Kid_Award.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
