<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Demo Superstar</title>
    <style>
        /* Orange Gradient Background */
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: #FF8C00; 
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%); 
            display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh;
        }
        
        /* Input Panel */
        .input-panel { 
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 25px; 
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border: 4px solid #fff; text-align: center; width: 90%; max-width: 450px;
        }
        input { 
            padding: 12px; width: 85%; margin: 10px 0; border: 2px solid #FF8C00; 
            border-radius: 12px; font-size: 16px; outline: none;
        }
        button { 
            padding: 15px 40px; background: #FF4500; color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 20px; 
            box-shadow: 0 6px 0 #cc3700; transition: 0.2s; margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #cc3700; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #cc3700; }

        /* The Certificate Design */
        #certificate { 
            display: none; width: 850px; height: 600px; background: white; 
            border: 15px solid #FF4500; border-radius: 40px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); text-align: center;
            overflow: hidden;
        }

        /* Orange Decorative Corner */
        .corner-decor {
            position: absolute; width: 200px; height: 200px; background: #FFA500;
            top: -100px; left: -100px; transform: rotate(45deg); z-index: 0;
        }

        .logo { width: 180px; margin-top: 40px; position: relative; z-index: 1; }
        .main-title { color: #FF4500; font-size: 60px; margin: 10px 0; font-weight: 900; text-transform: uppercase; }
        .sub-text { font-size: 24px; color: #555; margin: 5px 0; }
        
        .student-name { 
            font-size: 65px; color: #2c3e50; font-weight: bold; margin: 20px 0; 
            display: inline-block; border-bottom: 5px dashed #FF8C00;
        }
        
        .details-text { font-size: 26px; color: #333; line-height: 1.4; margin-top: 10px; }
        .highlight { color: #FF4500; font-weight: bold; font-size: 30px; }

        .footer { 
            position: absolute; bottom: 50px; width: 100%; display: flex; 
            justify-content: space-around; align-items: center; 
        }
        .signature { 
            font-family: 'Brush Script MT', cursive; font-size: 35px; 
            color: #2c3e50; border-bottom: 3px solid #FF4500; min-width: 200px; 
        }

        /* Fun Elements */
        .badge {
            position: absolute; top: 40px; right: 40px; width: 120px; height: 120px;
            background: #FFD700; border-radius: 50%; border: 5px dashed #FF4500;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; transform: rotate(15deg);
        }
    </style>
</head>
<body>

<div class="input-panel">
    <h2 style="color: #FF4500; margin-top: 0;">🟠 Orange Demo Creator</h2>
    <input type="text" id="stuName" placeholder="Child's Name">
    <input type="text" id="stuGrade" placeholder="Grade (e.g. Grade 1)">
    <input type="text" id="stuCourse" placeholder="Subject (e.g. Math Magic)">
    <br>
    <button onclick="generate()">Make It Pop! 🚀</button>
</div>

<div id="certificate">
    <div class="corner-decor"></div>
    <div class="badge">🏆</div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Vedantu_Logo.png/640px-Vedantu_Logo.png" class="logo" alt="Vedantu">
    
    <div class="main-title">DEMO CHAMP!</div>
    <div class="sub-text">This is awarded to our Superstar</div>
    
    <div class="student-name" id="displayName">Name</div>
    
    <div class="details-text">
        From <span class="highlight" id="displayGrade">Grade</span> <br>
        For Amazing Work in our <br>
        <span class="highlight" id="displayCourse">Course</span> Demo!
    </div>

    <div class="footer">
        <div>
            <div style="font-size: 22px; font-weight: bold; color: #FF4500;" id="displayDate">Date</div>
            <div style="font-size: 14px; color: #777;">Date of Completion</div>
        </div>
        <div>
            <div class="signature">Vamsi Krishna</div>
            <div style="font-size: 14px; font-weight: bold; color: #777;">CEO & Co-Founder, Vedantu</div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;
        
        if (name && grade && course) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB');
            
            document.getElementById('certificate').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("Oops! Please fill in all the details for the superstar!");
        }
    }
</script>

</body>
</html>
