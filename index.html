<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Completion Certificate</title>
    <style>
        /* Colorful background for kids */
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #FFEFBA; background: linear-gradient(to right, #FFFFFF, #FFEFBA); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .input-panel { background: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 3px solid #FF4500; text-align: center; }
        input { padding: 12px; width: 85%; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; }
        button { padding: 15px 30px; background: #FF4500; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px; transition: transform 0.2s; box-shadow: 0 4px 0 #b33000; }
        button:hover { transform: scale(1.05); background: #FF5722; }

        /* The Certificate */
        #certificate { 
            display: none; width: 850px; height: 600px; background: white; 
            border: 20px solid #3b82f6; border-radius: 30px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;
            background-image: radial-gradient(#3b82f6 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* Fun dot pattern */
        }

        .logo { width: 180px; margin-top: 30px; }
        .main-title { color: #FF4500; font-size: 50px; margin: 10px 0; text-shadow: 2px 2px #FFD700; }
        .sub-text { font-size: 22px; color: #444; margin: 10px 0; }
        
        .student-name { font-size: 55px; color: #3b82f6; font-weight: bold; margin: 15px 0; text-decoration: underline; }
        .details-text { font-size: 24px; color: #333; line-height: 1.6; }
        .highlight { color: #E91E63; font-weight: bold; }

        .footer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; }
        .sig-container { text-align: center; }
        .signature { font-family: 'Brush Script MT', cursive; font-size: 30px; color: #2c3e50; border-bottom: 2px solid #333; min-width: 180px; }
        
        /* Fun Decorations */
        .star { position: absolute; font-size: 40px; color: #FFD700; }
    </style>
</head>
<body>

<div class="input-panel">
    <h2 style="color: #FF4500;">🌟 Demo Certificate Creator</h2>
    <input type="text" id="stuName" placeholder="Student's Full Name">
    <input type="text" id="stuGrade" placeholder="Grade (e.g. Grade 2)">
    <input type="text" id="stuCourse" placeholder="Course Name (e.g. Coding Fun)">
    <br>
    <button onclick="generate()">Create My Certificate! ✨</button>
</div>

<div id="certificate">
    <div class="star" style="top:20px; left:20px;">⭐</div>
    <div class="star" style="top:20px; right:20px;">🌟</div>
    <div class="star" style="bottom:150px; left:40px;">🎨</div>
    <div class="star" style="bottom:150px; right:40px;">🚀</div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Vedantu_Logo.png/640px-Vedantu_Logo.png" class="logo" alt="Vedantu Logo">
    
    <div class="main-title">Superstar Award!</div>
    <div class="sub-text">This certificate is proudly presented to</div>
    
    <div class="student-name" id="displayName">Student Name</div>
    
    <div class="details-text">
        of <span class="highlight" id="displayGrade">Grade</span> <br>
        for successfully completing the Demo Class in <br>
        <span class="highlight" id="displayCourse">Course Name</span>
    </div>

    <div class="footer">
        <div>
            <div style="font-size: 20px; font-weight: bold;" id="displayDate">Date</div>
            <div style="font-size: 14px;">Date of Completion</div>
        </div>
        <div class="sig-container">
            <div class="signature">Vamsi Krishna</div>
            <div style="font-size: 14px; font-weight: bold;">CEO & Co-Founder, Vedantu</div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;
        
        if (name && grade && course) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString();
            
            document.getElementById('certificate').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("Please fill in all boxes to make the certificate!");
        }
    }
</script>

</body>
</html>
