<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Demo Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700;900&display=swap');

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }

        .admin-panel { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; 
            border-top: 6px solid #ff4500; width: 100%; max-width: 500px; text-align: center;
        }
        input, select { padding: 12px; width: 92%; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        .btn-gen { background: #ff4500; color: #fff; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 95%; margin-top: 10px; font-size: 16px; }
        .btn-dl { background: #28a745; color: #fff; padding: 12px 25px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none; margin-top: 15px; }

        #certificate { 
            display: none; width: 1000px; height: 700px; background: #fff; position: relative;
            overflow: hidden; border: 12px solid #ff4500; box-sizing: border-box;
        }

        .backdrop {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background-image: radial-gradient(#ffdfba 2px, transparent 2px), radial-gradient(#bae1ff 2px, #ffffff 2px);
            background-size: 50px 50px; background-position: 0 0, 25px 25px;
            opacity: 0.4; z-index: 1;
        }

        /* Fixed Kid Graphics - Adjusted Positions to avoid Date Overlap */
        .kid-icon { position: absolute; z-index: 5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .trophy { top: 30px; left: 30px; width: 80px; transform: rotate(-10deg); }
        .rocket { bottom: 40px; right: 40px; width: 90px; transform: rotate(-15deg); }
        .globe { top: 35px; right: 45px; width: 75px; }
        .books { top: 200px; left: 25px; width: 70px; transform: rotate(10deg); }
        .stars { top: 220px; right: 30px; width: 60px; opacity: 0.8; }
        .cap { bottom: 180px; right: 30px; width: 75px; transform: rotate(15deg); } /* Moved up to clear Date area */

        .cert-content { 
            position: relative; z-index: 10; height: 100%; width: 100%;
            display: flex; flex-direction: column; align-items: center; 
            padding: 25px 50px; box-sizing: border-box; text-align: center; justify-content: space-between;
        }

        .logo-img { height: 85px; margin-top: 5px; }
        .title-main { font-family: 'Cinzel', serif; font-size: 55px; color: #2c3e50; margin: 0; line-height: 1.1; }

        .name-container { 
            width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; 
            border-bottom: 3px dashed #ff4500; max-width: 650px; margin: 0 auto;
        }
        .student-name { font-size: 70px; color: #ff4500; font-weight: 900; margin: 0; text-transform: uppercase; white-space: nowrap; }

        .achievement-text { font-family: 'Libre Baskerville', serif; font-size: 22px; color: #2c3e50; line-height: 1.5; }
        .course-highlight { font-weight: 900; font-size: 34px; color: #007bff; text-transform: uppercase; display: block; margin-top: 5px; }

        .footer { width: 100%; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 40px; }
        .footer-col { text-align: center; min-width: 250px; background: rgba(255,255,255,0.6); border-radius: 10px; }
        .date-val { font-size: 20px; font-weight: 700; color: #2c3e50; margin-bottom: 5px; }
        .sig-val { font-family: 'Great Vibes', cursive; font-size: 45px; color: #2c3e50; margin-bottom: -10px; }
        .line { border-top: 2px solid #d4af37; padding-top: 8px; font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="color:#ff4500; margin-top:0;">Demo Certificate Generator</h2>
    <input type="text" id="stuName" placeholder="Enter Student Name">
    
    <select id="stuGrade">
        <option value="" disabled selected>Select Grade</option>
        <option value="LKG">LKG</option><option value="UKG">UKG</option>
        <option value="Grade 1">Grade 1</option><option value="Grade 2">Grade 2</option>
        <option value="Grade 3">Grade 3</option><option value="Grade 4">Grade 4</option>
        <option value="Grade 5">Grade 5</option><option value="Grade 6">Grade 6</option>
        <option value="Grade 7">Grade 7</option><option value="Grade 8">Grade 8</option>
        <option value="Grade 9">Grade 9</option><option value="Grade 10">Grade 10</option>
    </select>

    <select id="stuCourse">
        <option value="" disabled selected>Select Program</option>
        <option value="ENGLISH SUPERSTAR">English Superstar</option>
        <option value="SUPER MATH">Super Math</option>
        <option value="SUPER CODER">Super Coder</option>
        <option value="SUPER SPEAKER">Super Speaker</option>
        <option value="PHONICS CHAMP">Phonics Champ</option>
        <option value="CREATIVE WRITING">Creative Writing</option>
    </select>

    <button class="btn-gen" onclick="generate()">Create Certificate ✨</button>
    <button id="downloadBtn" class="btn-dl" onclick="download()">Download 📥</button>
</div>

<div id="certificate">
    <div class="backdrop"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="kid-icon trophy">
    <img src="https://cdn-icons-png.flaticon.com/512/1041/1041883.png" class="kid-icon rocket">
    <img src="https://cdn-icons-png.flaticon.com/512/814/814513.png" class="kid-icon globe">
    <img src="https://cdn-icons-png.flaticon.com/512/2702/2702134.png" class="kid-icon books">
    <img src="https://cdn-icons-png.flaticon.com/512/2490/2490354.png" class="kid-icon cap">

    <div class="cert-content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Vedantu_Logo.png/640px-Vedantu_Logo.png" class="logo-img">
        
        <div class="header-box">
            <div style="color: #ff4500; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; font-size: 12px;">Official Certificate of Achievement</div>
            <h1 class="title-main">CONGRATULATIONS</h1>
        </div>

        <p style="font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 18px; margin: 5px 0;">This recognition is proudly awarded to</p>
        
        <div class="name-container">
            <p class="student-name" id="displayName">NAME</p>
        </div>

        <p class="achievement-text">
            of <span style="font-weight:700; color:#ff4500;" id="displayGrade">GRADE</span> for demonstrating exceptional potential <br> during the official demo session of
            <span class="course-highlight" id="displayCourse">PROGRAM</span>
        </p>

        <div class="footer">
            <div class="footer-col">
                <div class="date-val" id="displayDate">17 March 2026</div>
                <div class="line">Date of Award</div>
            </div>
            <div class="footer-col">
                <div class="sig-val">Vamsi Krishna</div>
                <div class="line">Vamsi Krishna, CEO & Co-Founder</div>
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;

        if(name && grade && course) {
            const nameEl = document.getElementById('displayName');
            nameEl.innerText = name.toUpperCase();
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });

            // Anti-Overlap Script
            let size = 70;
            nameEl.style.fontSize = size + 'px';
            while (nameEl.scrollWidth > 640 && size > 12) {
                size -= 2;
                nameEl.style.fontSize = size + 'px';
            }

            document.getElementById('certificate').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-block';
        } else {
            alert("Please enter Name, Grade, and Program!");
        }
    }

    function download() {
        html2canvas(document.getElementById('certificate'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Vedantu_Demo_Award.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
