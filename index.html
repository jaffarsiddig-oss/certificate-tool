<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        #certificate { margin-top: 20px; padding: 20px; border: 5px double #555; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Certificate Tool</h1>
    <p>Enter your name to generate your certificate:</p>
    <input type="text" id="userName" placeholder="Your Name">
    <br>
    <button onclick="generate()">Generate Certificate</button>

    <div id="certificate">
        <h2>Certificate of Achievement</h2>
        <p>This is to certify that</p>
        <h1 id="displayName"></h1>
        <p>has successfully completed the program.</p>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('userName').value;
        if (name) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('certificate').style.display = 'block';
        } else {
            alert("Please enter a name!");
        }
    }
</script>

</body>
</html>
