<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Demo Completion Certificate</title>
    <style>
        /* Orange Theme & Kids Style */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #ffede6; 
            display: flex; flex-direction: column; align-items: center; padding: 30px; 
        }

        /* Editor Panel */
        .editor-panel { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; 
            border: 3px solid #ff4500; width: 100%; max-width: 500px; text-align: center;
        }
        input { 
            padding: 12px; width: 90%; margin: 10px 0; border: 2px solid #ddd; 
            border-radius: 8px; font-size: 16px; outline: none;
        }
        input:focus { border-color: #ff4500; }
        button { 
            padding: 15px 35px; background: #ff4500; color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px;
            margin-top: 10px; box-shadow: 0 4px 0 #cc3700;
        }
        button:hover { background: #e63e00; }

        /* THE CERTIFICATE (Matches your Image exactly) */
        #certificate { 
            display: none; width: 900px; height: 650px; background: white; 
            border: 25px solid #3b82f6; position: relative; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center;
        }

        /* Background Decorations (Book Club Style) */
        .decor { position: absolute; font-size: 80px; opacity: 0.9; z-index: 1; }
        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        .logo-container { margin-top: 40px; }
        .logo-main { width: 200px; }
        
        .book-club-text { color: #d81b60; font-size: 40px; font-weight: bold; margin: 5px 0; }
        .affirmation { color: #d81b60; font-size: 32px; font-weight: bold; margin: 20px 0; text-transform: uppercase; }
        
        .cert-text { font-size: 20px; color: #555; }
        .student-name { 
            font-size: 55px; color: #ff4500; font-weight: bold; 
            margin: 10px 0; display: inline-block; padding: 0 30px;
        }
        
        .course-info { font-size: 22px; color: #333; line-height: 1.6; margin-top: 10px; }
        .highlight { font-weight: bold; color: #3b82f6; }

        /* Footer Section */
        .footer { 
            position: absolute; bottom: 60px; width: 100%; display: flex; 
            justify-content: space-around; align-items: flex-end; 
        }
        .signature-box { text-align: center; border-top: 2px solid #333; width: 220px; padding-top: 5px; }
        .sig-name { font-family: 'Brush Script MT', cursive; font-size: 32px; color: #2c3e50; }
        .date-box { font-size: 18px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; }

        @media print { .editor-panel { display: none; } body { padding: 0; } #certificate { display: block; box-shadow: none; border: 15px solid #3b82f6; } }
    </style>
</head>
<body>

<div class="editor-panel">
    <h2 style="color:#ff4500">Vedantu Demo Certificate</h2>
    <input type="text" id="stuName" placeholder="Student Name (e.g. Rahul Kumar)">
    <input type="text" id="stuGrade" placeholder="Grade (e.g. Grade 3)">
    <input type="text" id="stuCourse" placeholder="Course/Program (e.g. Coding Demo)">
    <input type="text" id="stuAff" placeholder="Affirmation (e.g. BRILLIANT!)">
    <br>
    <button onclick="generate()">Generate & Show 🚀</button>
    <button onclick="window.print()" style="background:#3b82f6; box-shadow: 0 4px 0 #1d4ed8;">Save as PDF 📄</button>
</div>

<div id="certificate">
    <div class="decor top-left">📚</div>
    <div class="decor top-right">📖</div>
    <div class="decor bottom-left">💡</div>
    <div class="decor bottom-right">🎓</div>

    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Vedantu_Logo.png/640px-Vedantu_Logo.png" class="logo-main" alt="Vedantu">
    </div>
    
    <div class="book-club-text">DEMO COMPLETION</div>
    <div class="affirmation" id="displayAff">EXCELLENT WORK!</div>

    <p class="cert-text">This is to certify that</p>
    <div class="student-name" id="displayName">Student Name</div>

    <div class="course-info">
        a bright student of <span class="highlight" id="displayGrade">Grade X</span><br>
        has successfully completed the <span class="highlight" id="displayCourse">Demo Program</span><br>
        with amazing enthusiasm and curiosity!
    </div>

    <div class="footer">
        <div>
            <div class="date-box" id="displayDate">Date</div>
            <div style="font-size: 14px; margin-top:5px;">Date</div>
        </div>
        <div>
            <div class="sig-name">Vamsi Krishna</div>
            <div class="signature-box">
                <strong>Vamsi Krishna</strong><br>
                CEO & Co-Founder, Vedantu
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;
        const aff = document.getElementById('stuAff').value;

        if(name && grade && course) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            document.getElementById('displayAff').innerText = aff || "EXCELLENT WORK!";
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });

            document.getElementById('certificate').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("Please fill in Name, Grade, and Course!");
        }
    }
</script>

</body>
</html>
