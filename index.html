<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Demo Completion Certificate</title>
    <style>
        /* Orange & White Theme */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #FFF5F0; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }

        /* Modern Editor Panel */
        .editor-panel { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; 
            border: 3px solid #FF4500; width: 100%; max-width: 500px; text-align: center;
        }
        input { 
            padding: 12px; width: 90%; margin: 8px 0; border: 2px solid #FFCCBC; 
            border-radius: 10px; font-size: 16px; outline: none;
        }
        button { 
            padding: 15px 35px; background: #FF4500; color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 0 #bf3600; margin-top: 10px;
        }
        button:hover { background: #e63e00; transform: translateY(-2px); }

        /* THE CERTIFICATE DESIGN */
        #certificate { 
            display: none; width: 900px; height: 650px; background: white; 
            border: 20px solid #FF4500; border-radius: 40px; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; overflow: hidden;
        }

        /* Decorative Elements for Kids */
        .decor { position: absolute; font-size: 45px; opacity: 0.8; z-index: 1; }
        .top-left { top: 30px; left: 30px; }
        .top-right { top: 30px; right: 30px; }
        .bottom-left { bottom: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; }

        .logo-main { width: 280px; margin-top: 50px; }
        
        .main-title { color: #FF4500; font-size: 55px; font-weight: 900; margin: 20px 0 10px 0; }
        .sub-text { font-size: 22px; color: #555; font-weight: 600; }
        
        .student-name { 
            font-size: 65px; color: #1e88e5; font-weight: bold; 
            margin: 15px 0; display: inline-block; padding: 0 40px;
            border-bottom: 5px dashed #FFD700;
        }
        
        .details { font-size: 26px; color: #333; line-height: 1.5; margin: 15px 60px; }
        .orange-bold { color: #FF4500; font-weight: bold; }

        .footer { 
            position: absolute; bottom: 60px; width: 100%; display: flex; 
            justify-content: space-around; align-items: flex-end; 
        }
        .sig-box { text-align: center; border-top: 2px solid #333; width: 240px; padding-top: 5px; }
        .sig-name { font-family: 'Brush Script MT', cursive; font-size: 34px; color: #2c3e50; }
        .date-text { font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; }

        @media print { .editor-panel { display: none; } body { padding: 0; } #certificate { display: block; border: 12px solid #FF4500; } }
    </style>
</head>
<body>

<div class="editor-panel">
    <h2 style="color:#FF4500; margin-top:0;">🌟 Demo Certificate Generator</h2>
    <input type="text" id="stuName" placeholder="Student's Name">
    <input type="text" id="stuGrade" placeholder="Grade (e.g. Grade 2)">
    <input type="text" id="stuCourse" placeholder="Program Name (e.g. Science Magic)">
    <input type="text" id="stuAff" placeholder="Special Note (e.g. BRAVO!)">
    <br>
    <button onclick="generate()">Generate Certificate 🚀</button>
    <button onclick="window.print()" style="background:#1e88e5; box-shadow: 0 4px 0 #1565c0;">Save as PDF 📥</button>
</div>

<div id="certificate">
    <div class="decor top-left">🚀</div>
    <div class="decor top-right">🎨</div>
    <div class="decor bottom-left">🏆</div>
    <div class="decor bottom-right">💡</div>

    <img src="https://raw.githubusercontent.com/jaffarsiddig-oss/certificate-tool/main/image_3035f6.png" class="logo-main" alt="Vedantu Early Learning">
    
    <div class="main-title" id="displayAff">CERTIFICATE OF DEMO</div>
    <div class="sub-text">This is proudly awarded to our superstar</div>

    <div class="student-name" id="displayName">Name</div>

    <div class="details">
        of <span class="orange-bold" id="displayGrade">Grade</span> <br>
        for completing the <span class="orange-bold" id="displayCourse">Demo Program</span> <br>
        with amazing energy and a big smile!
    </div>

    <div class="footer">
        <div>
            <div class="date-text" id="displayDate">Date</div>
            <div style="font-size: 14px; margin-top:5px;">Completion Date</div>
        </div>
        <div>
            <div class="sig-name">Vamsi Krishna</div>
            <div class="sig-box">
                <strong>Vamsi Krishna</strong><br>
                CEO & Co-Founder, Vedantu
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;
        const aff = document.getElementById('stuAff').value;

        if(name && grade && course) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            document.getElementById('displayAff').innerText = aff || "CERTIFICATE OF DEMO";
            
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });

            document.getElementById('certificate').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("Please enter Name, Grade, and Program!");
        }
    }
</script>

</body>
</html>
