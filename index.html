<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedantu Superstar Certificate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Great+Vibes&display=swap');

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #fdf2f0; display: flex; flex-direction: column; align-items: center; padding: 30px; 
        }

        /* Input Form */
        .editor-panel { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; 
            border-top: 5px solid #ff4500; width: 100%; max-width: 500px; text-align: center;
        }
        input, select { padding: 12px; width: 85%; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .gen-btn { background: #ff4500; color: white; padding: 14px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 90%; }
        .dl-btn { background: #3b82f6; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; margin-top: 15px; }

        /* THE CERTIFICATE */
        #certificate { 
            display: none; width: 1000px; height: 720px; background: white; 
            position: relative; overflow: hidden; border: 15px solid #ff4500;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); box-sizing: border-box;
        }

        /* PREMIUM SUNBURST BACKGROUND */
        .sunburst {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle, #ffffff 10%, #fff5f0 100%);
            z-index: 0;
        }

        /* ACHIEVEMENT SYMBOLS (HD Laurel & Seal) */
        .laurel { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 200px; opacity: 0.1; z-index: 1; }
        .gold-seal { position: absolute; bottom: 80px; right: 60px; width: 120px; z-index: 5; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }

        .content { position: relative; z-index: 10; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 0; box-sizing: border-box; }

        /* LOGO PLACEMENT */
        .logo-img { width: 300px; margin: 0 auto; }
        
        .sub-header { color: #ff4500; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; margin-top: 10px; }
        .main-header { color: #2c3e50; font-size: 60px; font-weight: 900; margin: 5px 0; text-transform: uppercase; }
        
        .presented-to { font-size: 22px; color: #555; margin-top: 20px; font-style: italic; font-family: 'serif'; }
        
        .student-name { 
            font-size: 75px; color: #3b82f6; font-weight: 900; 
            margin: 10px 0; display: inline-block; padding: 0 40px;
            border-bottom: 3px solid #3b82f6;
        }
        
        .course-text { font-size: 24px; color: #444; margin: 15px 0; line-height: 1.4; }
        
        /* PROGRAM BOX - Fixed position to prevent overlap */
        .program-box {
            background: #ff4500; color: white; display: inline-block;
            padding: 12px 50px; border-radius: 8px; font-size: 32px;
            font-weight: 900; margin-top: 5px; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 69, 0, 0.2);
        }

        /* FOOTER - Grid layout for zero overwrite */
        .footer { 
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; padding: 0 80px; box-sizing: border-box;
            align-items: flex-end; margin-top: 30px;
        }
        .footer-col { text-align: center; }
        .sig-name { font-family: 'Great Vibes', cursive; font-size: 45px; color: #2c3e50; margin-bottom: -5px; }
        .line { border-top: 2px solid #333; padding-top: 8px; font-size: 14px; font-weight: bold; width: 240px; margin: 0 auto; color: #555; text-transform: uppercase; }
        .date-val { font-size: 22px; font-weight: bold; color: #1a1a1a; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="editor-panel">
    <h2 style="color:#ff4500; margin-top:0;">Vedantu Achievement Tool</h2>
    <input type="text" id="stuName" placeholder="Full Name of Student">
    <select id="stuGrade">
        <option value="" disabled selected>Select Grade</option>
        <option value="LKG">LKG</option>
        <option value="UKG">UKG</option>
        <option value="Grade 1">Grade 1</option>
        <option value="Grade 2">Grade 2</option>
        <option value="Grade 3">Grade 3</option>
        <option value="Grade 4">Grade 4</option>
        <option value="Grade 5">Grade 5</option>
        <option value="Grade 6">Grade 6</option>
        <option value="Grade 7">Grade 7</option>
        <option value="Grade 8">Grade 8</option>
        <option value="Grade 9">Grade 9</option>
        <option value="Grade 10">Grade 10</option>
    </select>
    <select id="stuCourse">
        <option value="" disabled selected>Select Program</option>
        <option value="English Superstar">English Superstar</option>
        <option value="Super Math">Super Math</option>
        <option value="Super Speaker">Super Speaker</option>
        <option value="Super Coder">Super Coder</option>
    </select>
    <br><br>
    <button class="gen-btn" onclick="generate()">Generate Achievement Award ✨</button>
    <button id="downloadBtn" class="dl-btn" onclick="downloadCert()">Download HD Certificate 📥</button>
</div>

<div id="certificate">
    <div class="sunburst"></div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Gold_seal.png" class="gold-seal">

    <div class="content">
        <img src="https://jaffarsiddig-oss.github.io/certificate-tool/image_2fccda.png" class="logo-img" alt="Vedantu Early Learning">
        
        <div>
            <div class="sub-header">Certificate of Achievement</div>
            <div class="main-header">CONGRATULATIONS</div>

            <div class="presented-to">This recognition is proudly awarded to</div>
            <div class="student-name" id="displayName">NAME HERE</div>

            <div class="course-text">
                of <span style="font-weight:900; color:#3b82f6;" id="displayGrade">GRADE</span> for successfully completing the official demo of
                <br>
                <div class="program-box" id="displayCourse">PROGRAM NAME</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-col">
                <div class="date-val" id="displayDate">17 March 2026</div>
                <div class="line">Completion Date</div>
            </div>
            <div class="footer-col">
                <div class="sig-name">Vamsi Krishna</div>
                <div class="line">
                    Vamsi Krishna<br>
                    CEO & Co-Founder, Vedantu
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('stuName').value;
        const grade = document.getElementById('stuGrade').value;
        const course = document.getElementById('stuCourse').value;

        if(name && grade && course) {
            document.getElementById('displayName').innerText = name.toUpperCase();
            document.getElementById('displayGrade').innerText = grade;
            document.getElementById('displayCourse').innerText = course;
            
            const today = new Date().toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('displayDate').innerText = today;

            document.getElementById('certificate').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("Please provide the superstar's details!");
        }
    }

    function downloadCert() {
        const cert = document.getElementById('certificate');
        html2canvas(cert, { useCORS: true, scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Vedantu_Superstar_Achievement.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>

</body>
</html>
